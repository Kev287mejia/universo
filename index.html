<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NUESTRO UNIVERSO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
    
    <style>
        #trail-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 150; pointer-events: none; /* Encima de todo pero no bloquea clics */
        }
        
        :root {
            --primary: #ffb3c6;
            --secondary: #ff809f;
            --accent: #ffd1dc;
            --text-glow: 0 0 15px rgba(255, 179, 198, 0.6), 0 0 30px rgba(255, 128, 159, 0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #030102; 
            font-family: 'Montserrat', sans-serif; 
            color: white; 
            -webkit-font-smoothing: antialiased;
        }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        /* Pantalla de Inicio Elegante */
        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, rgba(30,10,20,0.8) 0%, rgba(0,0,0,1) 100%);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #intro-screen h1 {
            font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: 3.5rem; letter-spacing: 6px; 
            margin-bottom: 2rem; text-align: center; text-shadow: var(--text-glow); color: var(--accent);
            opacity: 0; transform: translateY(20px); animation: fadeIn 3s ease forwards 0.5s;
        }

        #error-msg {
            font-size: 0.9rem; color: #ff6b6b; margin-bottom: 20px; font-weight: 300; text-align: center; max-width: 80%;
            display: none; /* Se mostrará si hay error de CORS */
        }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        #btn-enter {
            padding: 12px 45px; font-size: 1rem; font-weight: 300; background: transparent; color: var(--accent);
            border: 1px solid rgba(255, 179, 198, 0.4); border-radius: 50px; cursor: pointer; transition: all 0.5s ease; 
            font-family: inherit; letter-spacing: 4px; box-shadow: 0 0 20px rgba(255, 179, 198, 0.1);
            opacity: 0; animation: fadeIn 3s ease forwards 1.5s;
        }

        #btn-enter:hover { background: rgba(255, 179, 198, 0.1); border-color: var(--primary); box-shadow: var(--text-glow); transform: scale(1.05); }

        /* Tarjeta de Mensaje (Holográfica) */
        #message-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -40%) scale(0.95);
            width: 85%; max-width: 450px; padding: 50px 40px; text-align: center;
            background: linear-gradient(135deg, rgba(25, 10, 15, 0.7) 0%, rgba(10, 5, 10, 0.9) 100%);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 179, 198, 0.3); border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 30px rgba(255, 179, 198, 0.1);
            z-index: 50; opacity: 0; pointer-events: none; transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        #message-card.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

        #card-icon { font-size: 3.5rem; margin-bottom: 15px; filter: drop-shadow(0 0 20px rgba(255,179,198,0.8)); }

        #card-title {
            font-family: 'Montserrat', sans-serif; font-size: 0.9rem; letter-spacing: 3px; 
            color: var(--primary); margin-bottom: 15px; text-transform: uppercase;
        }

        #card-text { 
            font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.8rem; line-height: 1.4; 
            font-weight: 300; margin-bottom: 35px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .card-buttons {
            display: flex; justify-content: center; gap: 15px; margin-top: 15px;
        }

        .btn-action {
            background: transparent; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.8);
            padding: 10px 20px; border-radius: 30px; cursor: pointer; font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem; letter-spacing: 2px; transition: 0.4s; font-weight: 300;
        }

        .btn-action:hover { background: rgba(255,255,255,0.05); border-color: #fff; color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        /* Crosshair / Indicador de interacción */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3);
            z-index: 40; pointer-events: none; transition: 0.3s ease;
        }
        #crosshair.active { background: rgba(255,255,255,1); box-shadow: 0 0 15px var(--primary); transform: translate(-50%, -50%) scale(2); }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <canvas id="trail-canvas"></canvas>

    <div id="intro-screen">
        <h1 id="main-title">NUESTRO UNIVERSO</h1>
        <p id="error-msg">⚠️ Si ves esto negro y no avanza al darle Explorar, es porque abriste el archivo con doble clic. Debes usar "Live Server" o un servidor local.</p>
        <button id="btn-enter">EXPLORAR</button>
    </div>

    <div id="crosshair"></div>

    <div id="message-card">
        <div id="card-icon">✨</div>
        <div id="card-title">Lo que me gusta de ti</div>
        <p id="card-text">Mensaje</p>
        <div class="card-buttons">
            <button id="btn-close" class="btn-action">CERRAR</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Evitar que el mensaje de error aparezca si el script carga bien
        document.getElementById('error-msg').style.display = 'none';

        // --- OPCIÓN 6: Personalización del Nombre ---
        const urlParams = new URLSearchParams(window.location.search);
        const paramNombre = urlParams.get('nombre');
        const defaultTitle = "EL UNIVERSO DE GARDENIA Y KEVIN";
        const titleText = paramNombre ? `EL UNIVERSO DE ${paramNombre.toUpperCase()}` : defaultTitle;
        document.getElementById('main-title').innerText = titleText;
        document.title = titleText;

        // --- OPCIÓN 3: Estela Mágica en el Cursor ---
        const trailCanvas = document.getElementById('trail-canvas');
        const trailCtx = trailCanvas.getContext('2d');
        trailCanvas.width = window.innerWidth; trailCanvas.height = window.innerHeight;
        let trailParticles = [];
        
        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<3; i++) {
                trailParticles.push({
                    x: e.clientX, y: e.clientY,
                    vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5,
                    life: 1, size: Math.random()*2 + 1,
                    color: Math.random() > 0.5 ? '#ffb3c6' : '#ffffff'
                });
            }
        });
        
        function animateTrail() {
            trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
            for(let i=0; i<trailParticles.length; i++) {
                let p = trailParticles[i];
                trailCtx.fillStyle = p.color;
                trailCtx.globalAlpha = p.life;
                trailCtx.beginPath();
                trailCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                trailCtx.fill();
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            }
            trailParticles = trailParticles.filter(p => p.life > 0);
            requestAnimationFrame(animateTrail);
        }
        animateTrail();

        // ==========================================
        // ⚙️ BASE DE DATOS EMOCIONAL (80 ELEMENTOS)
        // ==========================================
        const svgsPosibles = [
            "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z", // Corazón
            "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z", // Estrella
            "M12 2l2.5 7.5L22 12l-7.5 2.5L12 22l-2.5-7.5L2 12l7.5-2.5L12 2z", // Destello mágico
            "M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z", // Luna
            "M12 2c-5.33 4.55-8 8.48-8 11.8 0 4.98 3.8 8.2 8 8.2s8-3.22 8-8.2c0-3.32-2.67-7.25-8-11.8z", // Gota / Pétalo
            "M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z", // Música
            "M12 2L2 12l10 10 10-10L12 2z" // Rombo
        ];
        const paletaColores = ['#ffb3c6', '#ff809f', '#ffd1dc', '#ffffff', '#ff99b3'];

        const frases = [
            "Tu sonrisa", "Tu mirada profunda", "Tu risa contagiosa", "La calidez de tu voz", "Tu inteligencia brillante", 
            "Tu sentido del humor único", "Tus abrazos que curan todo", "La paz infinita que me das", "Tu bondad desinteresada", "Tu locura divertida",
            "Tu forma única de ver el mundo", "La pasión que le pones a todo", "Tu gran empatía", "Tu creatividad sin límites", "Tu fuerza inquebrantable", 
            "Tu ternura al hablarme", "Tu paciencia conmigo", "El apoyo incondicional que me brindas", "La luz que irradias", "Tu energía positiva",
            "La suavidad de tus manos", "Tus caricias inesperadas", "Tu aroma que me encanta", "Tu forma de caminar", "Cómo me escuchas con atención", 
            "Cómo me hablas al oído", "Cómo me haces sentir único", "Tu maravillosa compañía", "Tus silencios cómodos", "Tu respiración cuando duermes",
            "Tus pequeños detalles", "Tus hermosas sorpresas", "Tu forma tan pura de amar", "Tu sinceridad total", "Tu honestidad valiente", 
            "Tu lealtad absoluta", "La confianza que me inspiras", "Tu valentía ante los retos", "Tu inmensa determinación", "Tu perseverancia",
            "Tu optimismo contagiante", "Tu esperanza en el futuro", "Tu fe en nosotros", "Tu alegría de vivir", "Tu entusiasmo por lo simple", 
            "Tu curiosidad de niño/a", "Tu increíble imaginación", "Tu maravillosa espontaneidad", "Tu autenticidad", "Tu hermosa originalidad",
            "Tus grandes metas", "Tus sueños más locos", "Tu forma de soñar despierto/a", "Tu forma de luchar por lo que quieres", "Tu resiliencia", 
            "Tu capacidad de perdonar", "Tu capacidad de aprender siempre", "Tu gran sabiduría", "Tu intuición perfecta", "Tu hermosa sensibilidad",
            "Cómo te emocionas por pequeñas cosas", "Tus gestos tan tuyos", "Tus divertidas manías", "Ese lunar que tanto me gusta", "Tu cabello", 
            "Tu perfil perfecto", "Tu carita al dormir", "Tu forma de despertar", "Tu carita cuando comes algo rico", "Tu forma de bailar sin pena",
            "Tus mensajes de buenos días", "Tus llamadas inesperadas", "Tus sabios consejos", "Tu forma de cuidarme", "Tu forma de protegerme", 
            "Tu forma de animarme cuando caigo", "Tu forma de consolarme", "Tu facilidad para hacerme reír", "Tu capacidad de hacerme pensar", "Que seas exactamente tú"
        ];

        const interactiveData = frases.map((frase, i) => {
            return {
                id: i,
                svg: svgsPosibles[Math.floor(Math.random() * svgsPosibles.length)],
                color: paletaColores[Math.floor(Math.random() * paletaColores.length)],
                title: frase,
                card: "Eres la pieza que le faltaba a mi universo. " + frase + " es algo que atesoro profundamente." 
            };
        });

        // Configuración de la escena
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030102, 0.002);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 40, 120);

        const isMobile = window.innerWidth <= 768;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(isMobile ? 1 : Math.min(window.devicePixelRatio, 2)); // Menos carga en móviles
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.03;
        controls.autoRotate = true; controls.autoRotateSpeed = 0.2;
        controls.maxDistance = 350; controls.minDistance = 25;

        // Post-processing Cinematico
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            isMobile ? 1.0 : 2.0, 0.8, 0.1 // Menos brillo en móvil para mejor rendimiento
        );
        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene); composer.addPass(bloomPass);

        // Agujero Negro y Halo (OPCIÓN 5: Mensaje Secreto)
        const bhGeometry = new THREE.SphereGeometry(12, 64, 64);
        const bhMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const blackHole = new THREE.Mesh(bhGeometry, bhMaterial);
        blackHole.userData = { isBlackHole: true };
        scene.add(blackHole);

        // Disco de Acreción (GLSL)
        const diskGeometry = new THREE.PlaneGeometry(100, 100, 128, 128);
        const diskShaderMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0.0 }, color1: { value: new THREE.Color(0xffd1dc) }, color2: { value: new THREE.Color(0xff5522) } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform float time; uniform vec3 color1; uniform vec3 color2; varying vec2 vUv;
                float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
                void main() {
                    vec2 p = -1.0 + 2.0 * vUv; float r = length(p); float a = atan(p.y, p.x);
                    if(r < 0.25) discard;
                    float f = sin(r * 30.0 - time * 2.0 + a * 4.0) + sin(r * 50.0 - time * 4.0 + a * 8.0) * 0.5;
                    vec3 col = mix(color2, color1, f * 0.5 + 0.5);
                    float glow = 0.08 / (r - 0.2); float edgeFade = smoothstep(1.0, 0.3, r);
                    float alpha = edgeFade * glow * (f * 0.5 + 0.8) + (rand(p * time * 0.001) * 0.1);
                    gl_FragColor = vec4(col * alpha * 1.5, alpha);
                }
            `,
            transparent: true, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const accretionDisk = new THREE.Mesh(diskGeometry, diskShaderMaterial);
        accretionDisk.rotation.x = Math.PI / 2.1; 
        scene.add(accretionDisk);

        // Estrellas de fondo
        const starCount = isMobile ? 5000 : 15000; // Menos estrellas en móviles
        const starGeo = new THREE.BufferGeometry(); const starPos = new Float32Array(starCount * 3);
        for(let i = 0; i < starCount; i++) {
            const r = 25 + Math.pow(Math.random(), 2) * 250; const theta = Math.random() * 2 * Math.PI; const phi = Math.acos((Math.random() * 2 - 1) * 0.1); 
            starPos[i*3] = r * Math.sin(phi) * Math.cos(theta); starPos[i*3+1] = r * Math.cos(phi) * (Math.random() * 0.6); starPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.6, color: 0xffe6ea, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
        const stars = new THREE.Points(starGeo, starMat); scene.add(stars);

        // ==========================================
        // 💖 CONVERTIR SVG EN HOLOGRAMAS MINIMALISTAS (NUEVO MÉTODO)
        // ==========================================
        const interactiveSprites = [];

        function createSvgHologramSprite(svgPath, colorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // 1. Aura holográfica
            const gradient = ctx.createRadialGradient(256, 256, 40, 256, 256, 200);
            gradient.addColorStop(0, colorHex); 
            gradient.addColorStop(0.5, colorHex + '66'); 
            gradient.addColorStop(1, 'rgba(0,0,0,0)'); 
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);

            // 2. Dibujar SVG usando Path2D
            ctx.save();
            ctx.translate(256, 256); 
            ctx.scale(12, 12); // Escalar icono de 24x24
            ctx.translate(-12, -12); // Centrar

            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#ffffff'; 
            
            const p = new Path2D(svgPath);
            ctx.fill(p);
            ctx.restore();

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace; 
            
            // Usar AdditiveBlending para que brille más como luz
            const material = new THREE.SpriteMaterial({ 
                map: texture, 
                transparent: true, 
                blending: THREE.AdditiveBlending, 
                depthWrite: false
            });

            const sprite = new THREE.Sprite(material);
            sprite.scale.set(16, 16, 1); 
            return sprite;
        }

        // --- OPCIÓN 4: Constelación en forma de Corazón ---
        const heartPoints = new Float32Array(15 * 3);
        const heartGeo = new THREE.BufferGeometry();
        heartGeo.setAttribute('position', new THREE.BufferAttribute(heartPoints, 3));
        const heartMat = new THREE.LineBasicMaterial({ color: 0xff809f, transparent: true, opacity: 0.6, linewidth: 2 });
        const heartConstellation = new THREE.LineLoop(heartGeo, heartMat);
        scene.add(heartConstellation);

        // Crear los 80 iconos en el espacio
        interactiveData.forEach((data, index) => {
            const sprite = createSvgHologramSprite(data.svg, data.color);
            let angle, distance, height, speed, bobSpeed;
            let isHeart = false;

            if (index < 15) {
                // Primeros 15 forman el corazón
                isHeart = true;
                const t = (index / 15) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3) * 3;
                const z = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 3;
                distance = Math.sqrt(x*x + z*z);
                angle = Math.atan2(z, x); 
                height = 25; // Flotando juntos
                speed = 0.003; // Todos giran a la misma velocidad para no romper el corazón
                bobSpeed = 2;
            } else {
                angle = (index / interactiveData.length) * Math.PI * 4 + Math.random(); 
                distance = 45 + (Math.random() * 100); 
                height = (Math.random() - 0.5) * 60;
                speed = 0.001 + Math.random() * 0.002;
                bobSpeed = 1 + Math.random() * 2;
            }
            
            sprite.position.set(Math.cos(angle) * distance, height, Math.sin(angle) * distance);

            sprite.userData = {
                data: data, angle: angle, distance: distance, baseY: height,
                speed: speed, bobSpeed: bobSpeed, originalScale: 16, isHeart: isHeart
            };

            scene.add(sprite);
            interactiveSprites.push(sprite);
        });

        // Interacción (Clics y Raycaster)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const crosshair = document.getElementById('crosshair');
        const cardModal = document.getElementById('message-card');
        
        let isPaused = false;
        let originalCamPos = new THREE.Vector3();

        // Máquina de escribir
        let typewriterTimeout;
        function typeWriterEffect(element, text, speed = 40) {
            element.innerHTML = "";
            let i = 0;
            clearTimeout(typewriterTimeout);
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    typewriterTimeout = setTimeout(type, speed);
                }
            }
            type();
        }

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('click', () => {
            if (cardModal.classList.contains('active') || isPaused) return;
            raycaster.setFromCamera(mouse, camera);
            
            // Incluir el agujero negro en la intersección
            const interactables = [...interactiveSprites, blackHole];
            const intersects = raycaster.intersectObjects(interactables);

            if (intersects.length > 0) {
                const clickedObj = intersects[0].object;
                
                // --- OPCIÓN 5: Huevo de Pascua en el Agujero Negro ---
                if (clickedObj.userData.isBlackHole) {
                    isPaused = true; controls.autoRotate = false;
                    originalCamPos.copy(camera.position);
                    
                    gsap.to(camera.position, { x: 0, y: 15, z: 45, duration: 2, ease: "power3.inOut" });
                    gsap.to(controls.target, { x: 0, y: 0, z: 0, duration: 2, ease: "power3.inOut" });
                    
                    setTimeout(() => {
                        const infinitySvg = "M18.6 6.62c-1.44 0-2.8.56-3.77 1.53L12 10.66 10.48 12h.01L7.8 14.39c-.64.64-1.49.99-2.4.99-1.87 0-3.39-1.51-3.39-3.38S3.53 8.62 5.4 8.62c.91 0 1.76.35 2.44 1.03l1.13 1 1.51-1.34L9.22 8.2C8.2 7.18 6.84 6.62 5.4 6.62 2.42 6.62 0 9.04 0 12s2.42 5.38 5.4 5.38c1.44 0 2.8-.56 3.77-1.53l2.83-2.5.01.01L13.52 12h-.01l2.69-2.39c.64-.64 1.49-.99 2.4-.99 1.87 0 3.39 1.51 3.39 3.38s-1.52 3.38-3.39 3.38c-.9 0-1.76-.35-2.44-1.03l-1.14-1.01-1.51 1.34 1.27 1.12c1.02 1.01 2.37 1.57 3.82 1.57 2.98 0 5.4-2.41 5.4-5.38s-2.42-5.37-5.4-5.37z";
                        document.getElementById('card-icon').innerHTML = `<svg viewBox="0 0 24 24" width="60" height="60" fill="#ffffff"><path d="${infinitySvg}"/></svg>`;
                        document.getElementById('card-icon').style.filter = `drop-shadow(0 0 20px #ffffff)`;
                        document.getElementById('card-title').innerText = 'EL CENTRO DEL UNIVERSO';
                        
                        const secretText = "Gardenia, pase lo que pase, incluso en la inmensidad del espacio o en el centro de un agujero negro donde el tiempo se detiene, mi lugar favorito siempre será a tu lado. Con cariño, Kevin.";
                        cardModal.classList.add('active');
                        typeWriterEffect(document.getElementById('card-text'), secretText);
                    }, 1000);
                    return;
                }

                const sprite = clickedObj;
                const data = sprite.userData.data;
                
                // Pausar movimiento orbital
                isPaused = true;
                controls.autoRotate = false;

                // Animación de cámara con GSAP hacia el emoji
                originalCamPos.copy(camera.position);
                const direction = sprite.position.clone().normalize();
                const targetCamPos = sprite.position.clone().add(direction.multiplyScalar(35));
                targetCamPos.y += 5; // Un poco más arriba

                gsap.to(camera.position, {
                    x: targetCamPos.x, y: targetCamPos.y, z: targetCamPos.z,
                    duration: 1.5, ease: "power3.inOut"
                });
                
                gsap.to(controls.target, {
                    x: sprite.position.x, y: sprite.position.y, z: sprite.position.z,
                    duration: 1.5, ease: "power3.inOut"
                });

                // Efecto de "latido" al hacer clic
                sprite.scale.set(24, 24, 1);
                setTimeout(() => sprite.scale.set(16, 16, 1), 300);

                // Mostrar tarjeta después de que la cámara empiece a acercarse
                setTimeout(() => {
                    document.getElementById('card-icon').innerHTML = `<svg viewBox="0 0 24 24" width="60" height="60" fill="#ffffff"><path d="${data.svg}"/></svg>`;
                    document.getElementById('card-icon').style.filter = `drop-shadow(0 0 20px ${data.color})`;
                    document.getElementById('card-title').innerText = data.title;
                    
                    cardModal.classList.add('active');
                    typeWriterEffect(document.getElementById('card-text'), data.card);
                }, 800);
            }
        });

        document.getElementById('btn-close').addEventListener('click', () => {
            cardModal.classList.remove('active');
            
            // Regresar la cámara a su lugar
            gsap.to(camera.position, {
                x: originalCamPos.x, y: originalCamPos.y, z: originalCamPos.z,
                duration: 1.5, ease: "power3.inOut"
            });
            gsap.to(controls.target, {
                x: 0, y: 0, z: 0,
                duration: 1.5, ease: "power3.inOut",
                onComplete: () => {
                    isPaused = false;
                    controls.autoRotate = true;
                }
            });
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            controls.update();
            diskShaderMaterial.uniforms.time.value = elapsedTime;
            
            if (!isPaused) {
                stars.rotation.y = elapsedTime * 0.005;
            }

            // Animar Sprites y Constelación
            const positions = heartConstellation.geometry.attributes.position.array;
            let heartIdx = 0;

            interactiveSprites.forEach((sprite) => {
                const ud = sprite.userData;
                if (!isPaused) {
                    ud.angle += ud.speed;
                }
                
                sprite.position.x = Math.cos(ud.angle) * ud.distance;
                sprite.position.z = Math.sin(ud.angle) * ud.distance;
                
                if (ud.isHeart) {
                    // Moverse todos juntos como grupo
                    sprite.position.y = ud.baseY + Math.sin(elapsedTime * ud.bobSpeed) * 3;
                    positions[heartIdx * 3] = sprite.position.x;
                    positions[heartIdx * 3 + 1] = sprite.position.y;
                    positions[heartIdx * 3 + 2] = sprite.position.z;
                    heartIdx++;
                } else {
                    sprite.position.y = ud.baseY + Math.sin(elapsedTime * ud.bobSpeed + ud.angle) * 3;
                }
                
                // Pulsación luminosa sutil
                const pulse = ud.originalScale + Math.sin(elapsedTime * 3 + ud.angle) * 1.5;
                if(sprite.scale.x < 20) sprite.scale.set(pulse, pulse, 1); 
            });
            heartConstellation.geometry.attributes.position.needsUpdate = true;

            // Hover effects
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveSprites);
            if(intersects.length > 0) {
                crosshair.classList.add('active'); document.body.style.cursor = 'pointer';
            } else {
                crosshair.classList.remove('active'); document.body.style.cursor = 'default';
            }

            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
            if(trailCanvas) { trailCanvas.width = window.innerWidth; trailCanvas.height = window.innerHeight; }
        });

        // --- OPCIÓN MUSICAL: Ambient Espacial ---
        const bgMusic = new Audio("https://archive.org/download/jamendo-449061/01-1871951-Sound%20Creator-Calm%20Space%20Ambient.mp3");
        bgMusic.loop = true;
        bgMusic.volume = 0.4; // Volumen suave, estilo cinematográfico

        document.getElementById('btn-enter').addEventListener('click', () => {
            // Iniciar música
            bgMusic.play().catch(e => console.log("Audio play failed:", e));

            const intro = document.getElementById('intro-screen'); intro.style.opacity = 0;
            setTimeout(() => intro.style.display = 'none', 2500);
            
            const targetZ = camera.position.z; camera.position.z = targetZ + 100;
            const introInterval = setInterval(() => {
                camera.position.z -= (camera.position.z - targetZ) * 0.05;
                if(Math.abs(camera.position.z - targetZ) < 0.1) clearInterval(introInterval);
            }, 16);
        });

        animate();
    </script>
